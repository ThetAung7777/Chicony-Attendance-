  function updateWeekdaysHeader() {
      let days = weekdaysText[currentLang];
      document.getElementById('weekdaysHeader').innerHTML = `<div style="color:#dc3545;">${days[0]}</div><div>${days[1]}</div><div>${days[2]}</div><div>${days[3]}</div><div>${days[4]}</div><div>${days[5]}</div><div style="color:#007bff;">${days[6]}</div>`;

  // ★ ၂၁ ရက်နေ့ရောက်ပါက အလိုအလျောက် လအသစ်သို့ ပြောင်းပေးမည့် စနစ် ★
  window.getRealCurrentMonth = () => {
      let d = new Date(); let realY = d.getFullYear(); let realM = d.getMonth() + 1;
      if (d.getDate() >= 21) { realM++; if(realM > 12) { realM = 1; realY++; } }
      return `${realY}-${String(realM).padStart(2,'0')}`;
  };

  window.changeLanguage = (lang) => {
      currentLang = lang; localStorage.setItem('appLang', lang); document.getElementById('langSelector').value = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
          let key = el.getAttribute('data-i18n'); if(translations[lang][key]) el.innerText = translations[lang][key];
      });
      updateWeekdaysHeader();
      if(isDataLoaded && document.getElementById('selectedMonth').value) window.generateGrid(false); 
      if(Object.keys(globalCalendar).length >= 0) renderYearCalendar();
  };

  window.logout = () => { signOut(auth).then(() => { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; location.reload(); }); };

  onAuthStateChanged(auth, (user) => {
      if (user) {
          currentUser = user; document.getElementById('loginScreen').style.display = 'none'; document.getElementById('mainApp').style.display = 'block';
          document.getElementById('userEmailDisplay').innerHTML = `<div class="profile-name-text">Loading...</div><div class="profile-email-text">${user.email}</div>`;
          if(user.email === ADMIN_EMAIL) { document.getElementById('adminPanelBtn').style.display = 'flex'; document.getElementById('adminCalendarControls').style.display = 'block'; }
          loadGlobalCalendar(); loadFromFirebase();
      } else { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; }
  });

  window.saveToFirebase = () => {
      if (!currentUser || !isDataLoaded) return; 
      appData.settings = {
          empName: document.getElementById('empName').value, empId: document.getElementById('empId').value,
          selectedMonth: document.getElementById('selectedMonth').value, dailyWage: document.getElementById('dailyWage').value,
          otRate: document.getElementById('otRate').value, attBonusSetting: document.getElementById('attBonusSetting').value,
          lastBonusMonth: appData.settings?.lastBonusMonth || window.getRealCurrentMonth()
      }; 
      if (!appData.attendance) appData.attendance = {};
      document.querySelectorAll('.day-card').forEach(card => {
          let dateKey = card.getAttribute('data-real-date');
          if (dateKey) {
              appData.attendance[dateKey] = {
                  shift: card.querySelector('.shift-select').value, status: card.querySelector('.status-select').value,
                  leaveType: card.querySelector('.leave-select').value, ot: card.querySelector('.ot-select').value, 
                  otHours: card.querySelector('.ot-hours').value
              };
          }
      });
      set(ref(db, 'users/' + currentUser.uid), appData);
  };

  // ★ ရှေ့လတွင် ပျက်ရက်ရှိမရှိ စစ်ဆေးမည့် Function ★
  window.checkAbsencesForMonth = (yyyy_mm) => {
      if (!appData.attendance) return false;
      let parts = yyyy_mm.split('-'); let y = parseInt(parts[0]); let m = parseInt(parts[1]);
      let startD = new Date(y, m - 2, 21); let endD = new Date(y, m - 1, 20);
      let cur = new Date(startD); let hasAbsence = false;
      
      while (cur <= endD) {
          let key = `${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, '0')}-${String(cur.getDate()).padStart(2, '0')}`;
          if (appData.attendance[key] && appData.attendance[key].status === 'x') {
              hasAbsence = true; break;
          }
          cur.setDate(cur.getDate() + 1);
      }
      return hasAbsence;
  };

  function loadFromFirebase() {
      document.getElementById('loadingSpinner').style.display = 'flex';
      onValue(ref(db, 'users/' + currentUser.uid), (snapshot) => {
          document.getElementById('loadingSpinner').style.display = 'none'; const data = snapshot.val();
          
          let realCurrentMonthStr = window.getRealCurrentMonth();
          
          if (data && data.settings && data.settings.empName && data.settings.empId) {
              appData = data;
              
              // ★ Auto Bonus စနစ် ★
              let lastBonusMonth = appData.settings.lastBonusMonth || "";
              if (lastBonusMonth !== realCurrentMonthStr) {
                  let [cY, cM] = realCurrentMonthStr.split('-').map(Number);
                  let pM = cM - 1; let pY = cY;
                  if(pM === 0) { pM = 12; pY--; }
                  let prevMonthStr = `${pY}-${String(pM).padStart(2,'0')}`;
                  
                  let hasAbsence = window.checkAbsencesForMonth(prevMonthStr);
                  let currentBonus = parseInt(appData.settings.attBonusSetting) || 500;
                  
                  if (hasAbsence) {
                      appData.settings.attBonusSetting = "500"; 
                  } else {
                      if (currentBonus <= 500) appData.settings.attBonusSetting = "800"; 
                      else if (currentBonus >= 800) appData.settings.attBonusSetting = "1000"; 
                  }
                  appData.settings.lastBonusMonth = realCurrentMonthStr;
                  set(ref(db, 'users/' + currentUser.uid + '/settings'), appData.settings); 
              }
              
              document.getElementById('empName').value = appData.settings.empName || ""; 
              document.getElementById('empId').value = appData.settings.empId || "";
              document.getElementById('selectedMonth').value = realCurrentMonthStr; 
              document.getElementById('dailyWage').value = appData.settings.dailyWage || 400;
              document.getElementById('otRate').value = appData.settings.otRate || 75; 
              document.getElementById('attBonusSetting').value = appData.settings.attBonusSetting || "0";
              
              document.getElementById('userEmailDisplay').innerHTML = `<div class="profile-name-text">${appData.settings.empName}</div><div class="profile-email-text">${currentUser.email}</div>`;
              isDataLoaded = true; window.generateGrid(false); 
          } else {
              document.getElementById('selectedMonth').value = realCurrentMonthStr; 
              document.getElementById('userEmailDisplay').innerHTML = `<div class="profile-name-text">New User</div><div class="profile-email-text">${currentUser.email}</div>`;
              isDataLoaded = true; window.generateGrid(true); 
              
              openSettings(); document.querySelector('#settingsModal .close-modal').style.display = 'none';
          }
      }, { onlyOnce: true });
  }

  function loadGlobalCalendar() {
      onValue(ref(db, 'globalCalendar'), (snapshot) => {
          globalCalendar = snapshot.exists() ? snapshot.val() : {};
          renderYearCalendar();
          if(currentUser && currentUser.email === ADMIN_EMAIL) renderAdminManageList();
          if(isDataLoaded && document.getElementById('selectedMonth').value) window.generateGrid(false);
      });
  }

  window.addAdminDate = () => { let date = document.getElementById('adminNewDate').value; let type = document.getElementById('adminDateType').value; let desc = document.getElementById('adminNewDesc').value; if(!date) return alert("Select Date!"); if(type === 'holiday' && !desc) return alert("Enter holiday description!"); let dataToSave = type === 'holiday' ? { type: 'holiday', desc: desc } : { type: 'double', desc: desc || 'Double' }; set(ref(db, 'globalCalendar/' + date), dataToSave).then(() => { document.getElementById('adminNewDate').value = ''; document.getElementById('adminNewDesc').value = ''; }); };
  window.deleteAdminDate = (dateKey) => { if(confirm("Are you sure?")) remove(ref(db, 'globalCalendar/' + dateKey)); };
  window.editAdminDate = (dateKey) => { let currentData = globalCalendar[dateKey]; let newDesc = prompt("Edit Description:", currentData.desc || ""); if(newDesc !== null && newDesc.trim() !== "") set(ref(db, 'globalCalendar/' + dateKey), { type: currentData.type, desc: newDesc }); };

  function renderAdminManageList() {
      let html = ''; let dates = Object.keys(globalCalendar).sort();
      if(dates.length === 0) { html = '<div style="padding:10px; text-align:center; font-size:12px; color:#666;">No Records.</div>'; } 
      else {
          dates.forEach(d => { let data = globalCalendar[d]; let dObj = new Date(d); let displayDate = `${dObj.getDate()}/${dObj.getMonth()+1}/${dObj.getFullYear()}`; let badge = data.type === 'holiday' ? '🟨 Holiday' : '🟦 Double'; let desc = data.desc ? ` - ${data.desc}` : ''; html += `<div class="manage-list-item"><div><b style="color:#007bff;">${displayDate}</b> <span style="font-size:11px; margin-left:5px;">(${badge}${desc})</span></div><div class="manage-btn-group"><button class="btn-sm-edit interactive-btn" onclick="editAdminDate('${d}')">Edit</button><button class="btn-sm-del interactive-btn" onclick="deleteAdminDate('${d}')">Del</button></div></div>`; });
      }
      document.getElementById('adminManageList').innerHTML = html;
  }

  window.showHolidayAlert = (desc) => { let prefix = translations[currentLang].holAlertPrefix; alert(prefix + desc); };

  function renderYearCalendar() {
      document.getElementById('calYearDisplay').innerText = CALENDAR_YEAR;
      const container = document.getElementById('yearCalendarContainer'); container.innerHTML = '';
      let monthsArray = currentLang === 'my' ? myanmarMonths : (currentLang === 'th' ? thaiMonths : englishMonths);
      let daysHeader = weekdaysText[currentLang];

      for(let m = 0; m < 12; m++) {
          let monthDiv = document.createElement('div'); monthDiv.className = 'month-box';
          let title = `<div class="month-title">${monthsArray[m]}</div>`;
          let header = `<div class="month-days-header"><div style="color:#dc3545;">${daysHeader[0]}</div><div>${daysHeader[1]}</div><div>${daysHeader[2]}</div><div>${daysHeader[3]}</div><div>${daysHeader[4]}</div><div>${daysHeader[5]}</div><div style="color:#007bff;">${daysHeader[6]}</div></div>`;
          let gridHtml = `<div class="month-grid">`;
          let firstDay = new Date(CALENDAR_YEAR, m, 1).getDay(); let daysInMonth = new Date(CALENDAR_YEAR, m + 1, 0).getDate();
          
          for(let i = 0; i < firstDay; i++) gridHtml += `<div class="cal-day empty"></div>`;
          for(let d = 1; d <= daysInMonth; d++) {
              let curDate = new Date(CALENDAR_YEAR, m, d);
              let dateKey = `${curDate.getFullYear()}-${String(curDate.getMonth()+1).padStart(2,'0')}-${String(curDate.getDate()).padStart(2,'0')}`;
              let isSun = curDate.getDay() === 0; let isSat = curDate.getDay() === 6; 
              let calData = globalCalendar[dateKey]; let classes = 'cal-day'; let onClick = '';
              
              if(calData) {
                  if(calData.type === 'holiday') { classes += ' cal-holiday'; let safeDesc = calData.desc ? calData.desc.replace(/'/g, "\\'").replace(/"/g, "&quot;") : ''; onClick = `onclick="showHolidayAlert('${safeDesc}')"`; }
                  else if(calData.type === 'double') { classes += ' cal-double'; if(isSat) classes += ' double-saturday'; }
              } else if(isSun) { classes += ' cal-sun'; }
              gridHtml += `<div class="${classes}" ${onClick}>${d}</div>`;
          }
          gridHtml += `</div>`; monthDiv.innerHTML = title + header + gridHtml; container.appendChild(monthDiv);
      }
  }

          if(rDate >= sDate && rDate <= eDate) { 
              let date = card.getAttribute('data-date'); let shiftVal = card.querySelector('.shift-select').value; let statusVal = card.querySelector('.status-select').value; let leaveVal = card.querySelector('.leave-select').value; let ot = card.getAttribute('data-ot') || "0"; let total = parseFloat(card.getAttribute('data-total') || "0"); 
              let calData = globalCalendar[rDate]; let isAdminDouble = calData?.type === 'double'; let isAdminHoliday = calData?.type === 'holiday';
              let displayShift = shiftVal === 'day' ? 'Day' : 'Night'; let displayStatus = statusVal; 
              
              if(statusVal === '-') { displayShift = 'All'; displayStatus = 'Holiday'; if(isAdminHoliday) { expPubHolCount++; expPubHolPay += wage; } } 
              else if (statusVal === '✓') displayStatus = 'Present'; 
              else if (statusVal === 'x') displayStatus = leaveVal === 'medical' ? 'Medical Leave' : 'Absent'; 
              else displayStatus = '-'; 
              
              let isWorking = (statusVal === '✓'); let displayOt = (ot === "0" || ot === 0 || ot === "" || !isWorking) ? "-" : ot; let displayTotal = (total === 0 || total === "0") ? "-" : total;
              excelData.push([date, displayShift, displayStatus, displayOt, displayTotal]); 
              
              if(statusVal === '✓') { expWork++; expOtHrs += parseFloat(ot); if(isAdminHoliday || isAdminDouble) expDouble++; } 
              else if(statusVal === 'x') { if(leaveVal === 'medical') { expMedCount++; expMedPay += wage; } else { expAbsent++; } } 
              expTotal += total; 
          } 
      }); 
      
      let totalAbs = expAbsent + expMedCount; let expBonus = (totalAbs > 0) ? 0 : bonusSetting; expTotal += expBonus; 
      
      excelData.push([]); 
      excelData.push(["", "", "", "Attendance Bonus", expBonus + " Baht"]); 
      excelData.push(["", "", "", "Public Holiday Pay", expPubHolCount + " Days / " + expPubHolPay + " Baht"]); 
      excelData.push(["", "", "", "Medical Leave Pay", expMedCount + " Days / " + expMedPay + " Baht"]); 
      excelData.push(["", "", "", "Total Work Hours", (expWork * 8) + " hrs"]); 
      excelData.push(["", "", "", "Total Normal OT Hours", expOtHrs + " hrs"]); 
      if(expDouble > 0) excelData.push(["", "", "", "2X Days Work Hours", (expDouble * 8) + " hrs"]); 
      excelData.push(["", "", "", "Absent (Unpaid)", expAbsent + " Days"]); 
      excelData.push(["", "", "", "Net Salary", expTotal + " Baht"]); 
      excelData.push([]); excelData.push(["", "", "", "Developed by", "THET AUNG"]); 
      
      let wb = XLSX.utils.book_new(); let ws = XLSX.utils.aoa_to_sheet(excelData); 
      XLSX.utils.book_append_sheet(wb, ws, "Salary_Report"); let name = document.getElementById('empName').value || 'Employee'; 
      XLSX.writeFile(wb, `${name}_Salary_${sDate}_to_${eDate}.xlsx`); closeExportModal(); 
  };

  window.viewUserDetail = (uid) => { 
      window.currentViewUid = uid; let uData = window.allUsersData[uid]; if(!uData) return; 
      let name = uData.settings?.empName || 'Unknown'; document.getElementById('detailModalName').innerText = name; 
      let html = `<div style="display:flex; gap:10px; margin-bottom: 15px;"><button class="admin-action-btn btn-exp-excel interactive-btn" onclick="exportAdminIndividual('excel')">📊 Excel</button><button class="admin-action-btn btn-exp-pdf interactive-btn" onclick="exportAdminIndividual('pdf')">📄 PDF</button></div><table class="admin-detail-table"><thead><tr><th>Date</th><th>Shift</th><th>Status</th><th>OT</th></tr></thead><tbody>`; 
      if(uData.attendance) { 
          let dates = Object.keys(uData.attendance).sort(); let hasRecords = false; 
          dates.forEach(d => { 
              let rec = uData.attendance[d]; 
              if(rec.status) { 
                  hasRecords = true; let dObj = new Date(d); let displayDate = `${dObj.getDate()}/${dObj.getMonth()+1}/${dObj.getFullYear()}`; 
                  let shiftStr = rec.shift === 'day' ? '☀️ နေ့' : '🌙 ည'; let statusStr = rec.status; 
                  if(rec.status === '✓') statusStr = '<span style="color:#198754; font-weight:bold;">✓ ဆင်း</span>'; 
                  else if(rec.status === 'x') statusStr = rec.leaveType === 'medical' ? '<span style="color:#fd7e14; font-weight:bold;">+ ဆေးခွင့်</span>' : '<span style="color:#dc3545; font-weight:bold;">x ပျက်</span>'; 
                  else if(rec.status === '-') { statusStr = 'ပိတ်ရက်'; shiftStr = '-'; } 
                  
                  let ot = rec.ot === 'yes' ? (rec.otHours || "0") : "0"; let isWorking = (rec.status === '✓'); let displayOt = (ot === "0" || ot === 0 || !isWorking) ? "-" : (ot + " နာရီ");
                  html += `<tr><td>${displayDate}</td><td>${shiftStr}</td><td>${statusStr}</td><td>${displayOt}</td></tr>`; 
              } 
          }); 
          if(!hasRecords) html += '<tr><td colspan="4">No Data</td></tr>'; 
      } else { html += '<tr><td colspan="4">No Data</td></tr>'; } 
      html += `</tbody></table><div style="text-align:right; margin-top:10px; font-weight:bold; color:#dc3545;">Total: ${uData.calculatedTotal?.toLocaleString()} ฿</div>`; 
      document.getElementById('adminDetailContent').innerHTML = html; document.getElementById('adminUserDetailModal').style.display = 'flex'; 
  };
  
  window.closeAdminUserDetail = () => { document.getElementById('adminUserDetailModal').style.display = 'none'; };
  
  window.exportAdminIndividual = (type) => { 
      let uid = window.currentViewUid; let uData = window.allUsersData[uid]; if(!uData || !uData.attendance) return; 
      let name = uData.settings?.empName || 'Unknown'; let empId = uData.settings?.empId || '-'; 
      let dates = Object.keys(uData.attendance).sort(); let exportArr = []; 
      dates.forEach(d => { 
          let rec = uData.attendance[d]; 
          if(rec.status) { 
              let shift = rec.shift === 'day' ? 'Day' : 'Night'; 
              let stat = rec.status === '✓' ? 'Present' : (rec.status === 'x' ? (rec.leaveType === 'medical' ? 'Med Leave' : 'Absent') : 'Holiday'); 
              if(rec.status === '-') shift = 'All'; 
              let ot = rec.ot === 'yes' ? (rec.otHours || "0") : "0"; let isWorking = (rec.status === '✓'); let displayOt = (ot === "0" || ot === 0 || !isWorking) ? "-" : ot;
              exportArr.push([d, shift, stat, displayOt]); 
          } 
      }); 
      if(type === 'excel') { 
          let excelData = [ ["Date", "Shift", "Status", "OT Hours"] ]; exportArr.forEach(r => excelData.push(r)); 
          excelData.push([]); excelData.push(["", "", "Total Salary", uData.calculatedTotal + " Baht"]); 
          let wb = XLSX.utils.book_new(); let ws = XLSX.utils.aoa_to_sheet(excelData); XLSX.utils.book_append_sheet(wb, ws, "Details"); XLSX.writeFile(wb, `${name}_Details.xlsx`); 
      } else { 
          let html = `<div class="print-header"><h2>Chicony Employee Detail</h2><p><b>Name:</b> ${name} | <b>ID:</b> ${empId}</p></div><table class="print-table"><thead><tr><th>Date</th><th>Shift</th><th>Status</th><th>OT Hours</th></tr></thead><tbody>`; 
          exportArr.forEach(r => html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`); 
          html += `</tbody></table><table class="print-summary"><tr><th>Total Salary</th><td><b>${uData.calculatedTotal} Baht</b></td></tr></table>`; 
          document.getElementById('printArea').innerHTML = html; setTimeout(() => { window.print(); }, 800); 
      } 
  };
  
  if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').then(reg => { console.log('Service worker registered.'); }).catch(err => { console.log('Service worker registration failed:', err); }); }); }
</script>
</body>
